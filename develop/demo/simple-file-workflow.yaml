workflow:
  name: simple-file-demo
  version: 1
  start: prepare_workspace
  done: done
  blocked: blocked

  steps:
    prepare_workspace:
      kind: demo
      template: demo.prepare_workspace
      produces:
        - artifacts.workspaceManifest
      outcomes:
        workspace_ready: write_seed_file
        blocked: blocked

    write_seed_file:
      kind: demo
      template: demo.write_seed_file
      takes:
        - artifacts.workspaceManifest
      produces:
        - artifacts.seedFile
      outcomes:
        seed_written: append_summary
        blocked: blocked

    append_summary:
      kind: demo
      template: demo.append_summary
      takes:
        - artifacts.seedFile
      produces:
        - artifacts.summaryFile
      outcomes:
        summary_appended: verify_files
        blocked: blocked

    verify_files:
      kind: demo
      template: demo.verify_files
      takes:
        - artifacts.seedFile
        - artifacts.summaryFile
      produces:
        - artifacts.verification
      outcomes:
        verified: finalize
        blocked: blocked

    finalize:
      kind: demo
      template: demo.finalize
      takes:
        - artifacts.verification
      produces:
        - artifacts.finalReport
      outcomes:
        done: done
        blocked: blocked

    done:
      kind: terminal
      produces:
        - final_summary

    blocked:
      kind: terminal
      takes:
        - blocker
      produces:
        - blocker_summary
